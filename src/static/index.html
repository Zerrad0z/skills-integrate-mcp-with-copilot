<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Mergington High School</h1>
      <h2>Extracurricular Activities</h2>
      <div class="header-right">
        <button id="user-icon-btn" class="user-icon-btn" title="Admin Login">👤</button>
      </div>
    </header>

    <!-- Login Modal -->
    <div id="login-modal" class="modal hidden">
      <div class="modal-content">
        <div class="modal-header">
          <h3>Teacher Login</h3>
          <button class="close-btn" id="close-login-modal">&times;</button>
        </div>
        <div class="modal-body">
          <form id="login-form">
            <div class="form-group">
              <label for="username">Username:</label>
              <input type="text" id="username" required placeholder="Enter username" />
            </div>
            <div class="form-group">
              <label for="password">Password:</label>
              <input type="password" id="password" required placeholder="Enter password" />
            </div>
            <button type="submit" class="btn-primary">Login</button>
          </form>
          <div id="login-message" class="hidden"></div>
        </div>
      </div>
    </div>

    <!-- Logout Button (hidden by default) -->
    <div id="logout-container" class="hidden">
      <div class="logout-panel">
        <span id="username-display"></span>
        <button id="logout-btn" class="btn-secondary">Logout</button>
      </div>
    </div>

    <main>
      <section id="activities-container">
        <h3>Available Activities</h3>
        <div id="activities-list">
          <!-- Activities will be loaded here -->
          <p>Loading activities...</p>
        </div>
      </section>

      <section id="signup-container" class="hidden">
        <h3>Register Student for an Activity</h3>
        <form id="signup-form">
          <div class="form-group">
            <label for="email">Student Email:</label>
            <input type="email" id="email" required placeholder="your-email@mergington.edu" />
          </div>
          <div class="form-group">
            <label for="activity">Select Activity:</label>
            <select id="activity" required>
              <option value="">-- Select an activity --</option>
              <!-- Activity options will be loaded here -->
            </select>
          </div>
          <button type="submit">Register Student</button>
        </form>
        <div id="message" class="hidden"></div>
      </section>

      <section id="view-only-container">
        <p class="info-text">Sign in above to manage student registrations.</p>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Mergington High School</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
